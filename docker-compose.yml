version: '3.8'

services:
  daily-book:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daily-book-spring
    ports:
      - "8080:8080"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SPRING_PROFILES_ACTIVE=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/books/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  app-data:
    driver: local

networks:
  default:
    name: daily-book-network
    driver: bridge
