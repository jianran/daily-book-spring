version: '3.8'

services:
  daily-book:
    # Pull the pre-built image from GitHub CI/CD (ghcr.io)
    # To build locally instead: docker compose build
    image: ghcr.io/jianran/daily-book-spring:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daily-book-spring
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/books/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

networks:
  default:
    name: daily-book-network
    driver: bridge
