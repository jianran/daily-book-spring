# Server Configuration
server.port=8080

# Load .env file
spring.config.import=optional:file:.env

# Application Name
spring.application.name=daily-book-spring

# DeepSeek AI Configuration
spring.ai.deepseek.api.key=${DEEPSEEK_API_KEY:your-api-key-here}
spring.ai.deepseek.chat.options.model=deepseek-chat
spring.ai.deepseek.chat.options.temperature=0.7

# Google Books API (uses public API, no key required for most endpoints)
google.books.api.key=${GOOGLE_BOOKS_API_KEY:}

# Logging
logging.level.com.dailybook=DEBUG
logging.level.org.springframework.ai=INFO

# Actuator endpoints (for monitoring)
management.endpoints.web.exposure.include=health,info

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# Discord Configuration
discord.webhook.url=${DISCORD_WEBHOOK_URL:}
discord.user.id=${DISCORD_USER_ID:}
discord.auth.token=${DISCORD_BOT_TOKEN:}
